name: Release

# Build the compiled binaries for every platform and publish them on a GitHub
# Release whenever a version tag (e.g. v0.1.0) is pushed. The release is gated:
# it only publishes if the test/lint/coverage checks pass, the compiled binary
# actually runs, and the tag matches the version baked into the code.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- gate: never publish a broken tag -----------------------------------
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg. Bump the version before tagging."
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Coverage gate
        run: bun run coverage-gate

      # --- build --------------------------------------------------------------
      - name: Cross-compile all targets
        run: bun run build:all

      - name: Smoke-test the Linux binary
        run: |
          chmod +x dist/firefly-linux-x64
          ./dist/firefly-linux-x64 version
          ./dist/firefly-linux-x64 --help >/dev/null

      - name: Generate checksums
        working-directory: dist
        run: sha256sum firefly-* > SHA256SUMS

      # --- publish ------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/firefly-linux-x64
            dist/firefly-linux-arm64
            dist/firefly-darwin-x64
            dist/firefly-darwin-arm64
            dist/firefly-windows-x64.exe
            dist/SHA256SUMS
