name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile all targets
        run: bun run build:all

      - name: Generate checksums
        working-directory: dist
        run: sha256sum firefly-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: |
            dist/firefly-linux-x64
            dist/firefly-linux-arm64
            dist/firefly-darwin-x64
            dist/firefly-darwin-arm64
            dist/firefly-windows-x64.exe
            dist/SHA256SUMS
